name: Website - Test
on: [push, workflow_dispatch]
jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Working Directory
        run: "cd $GITHUB_WORKSPACE/website"
      - name: "Install (via Yarn)"
        uses: borales/actions-yarn@v2.0.0
        with:
          cmd: install
      - name: "Build (via Yarn)"
        uses: borales/actions-yarn@v2.0.0
        with:
          cmd: build
      - name: "Test (via Yarn)"
        uses: borales/actions-yarn@v2.0.0
        with:
          cmd: test
